name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        laravel: ['12', '13']
        include:
          - laravel: '11'
            testbench: '^9.0'
          - laravel: '12'
            testbench: '^10.0'
          - laravel: '13'
            testbench: '^11.0'

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring, pdo, sqlite3
          coverage: none

      - name: Require Laravel ${{ matrix.laravel }}
        run: |
          composer require \
            "illuminate/console:^${{ matrix.laravel }}.0" \
            "illuminate/contracts:^${{ matrix.laravel }}.0" \
            "illuminate/database:^${{ matrix.laravel }}.0" \
            "illuminate/filesystem:^${{ matrix.laravel }}.0" \
            "illuminate/support:^${{ matrix.laravel }}.0" \
            "illuminate/view:^${{ matrix.laravel }}.0" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run tests
        run: composer test

  analyse:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, mbstring, pdo, sqlite3
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan
        run: composer test:types
